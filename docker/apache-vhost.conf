# ============================================================
# AutoSecForge – Apache virtual-host configuration
# ASF-006: Security headers at server level (belt-and-suspenders
#          alongside the PHP-level headers in helpers.php)
# ASF-004: PHP execution blocked in storage/ directory
# T11:     TRACE method disabled
# ============================================================

ServerTokens Prod
ServerSignature Off
TraceEnable Off          # T11 FIX: disable TRACE method globally

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # ASF-006 FIX – Security response headers (belt-and-suspenders)
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
    # Note: HSTS is set by PHP (Strict-Transport-Security) since this
    # container may be behind a TLS-terminating reverse proxy.

    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ASF-004 FIX: Block PHP execution inside storage/ which is
    # bind-mounted into the container.  Files here are served by the
    # proxy controller (serve-logo.php) only.
    <Directory /var/www/storage>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all denied    # No direct HTTP access at all
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
