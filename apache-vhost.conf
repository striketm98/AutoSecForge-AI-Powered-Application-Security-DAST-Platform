# ── AutoSecForge Pro v12.1 — Domain-locked HTTPS vhost ───────────────
# Access policy:
#   • Reachable via https://autosecforge.com  (laptops, hosts file)
#   • Reachable via https://100.86.46.5 and *.ts.net (Tailscale: phones/tablets)
#   • Any other Host header → 403 Forbidden (the RewriteCond gate below)
#   • Plain HTTP is redirected to HTTPS for the allowed hosts.
# Self-signed cert is generated at image build (see Dockerfile).
#
# NOTE: there is intentionally a SINGLE *:443 vhost. A bare-IP request (e.g.
# from a phone at https://100.86.46.5) carries NO SNI, so Apache terminates
# TLS on the first/default :443 vhost. If that default were a separate "deny"
# vhost, routing the request by its Host header to a different vhost would trip
# Apache's SNI/Host consistency check and return 421 Misdirected Request. By
# making the application the only :443 vhost, TLS and Host land on the same
# vhost, and the RewriteCond gate does the host filtering instead.

ServerName autosecforge.com

# ===================================================================
#  PORT 80 — redirect allowed hosts to HTTPS, deny everything else
# ===================================================================

# Default catch-all on :80 — blocks unknown hosts over plain HTTP.
# (Plain HTTP has no TLS handshake, so host-based routing here is safe.)
<VirtualHost *:80>
    ServerName  asf-deny-http
    DocumentRoot /var/www/html
    <Location />
        Require all denied
    </Location>
</VirtualHost>

# Allowed hosts on :80 — force HTTPS, preserving the host the client used.
<VirtualHost *:80>
    ServerName autosecforge.com
    ServerAlias 100.86.46.5 *.ts.net
    RewriteEngine On
    RewriteRule ^/?(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

# ===================================================================
#  PORT 443 — TLS — the real application (ONLY :443 vhost; see note above)
# ===================================================================
<VirtualHost *:443>
    ServerName autosecforge.com
    # Tailnet access: route the Tailscale IP and MagicDNS name here too so
    # phones/tablets (which can't edit a hosts file) reach the app by IP.
    ServerAlias 100.86.46.5 *.ts.net
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/ssl/asf/autosecforge.crt
    SSLCertificateKeyFile /etc/ssl/asf/autosecforge.key
    SSLProtocol           -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite        HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder   on

    # Hard gate: serve only for approved hostnames; everything else → 403.
    #   • autosecforge.com    — canonical domain (laptops via hosts file)
    #   • 100.86.46.5         — Tailscale IP (phones/tablets, no hosts file)
    #   • *.ts.net            — Tailscale MagicDNS name
    # Conditions are AND-ed, so access is denied only when the Host matches
    # NONE of the allowed patterns.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^autosecforge\.com$        [NC]
    RewriteCond %{HTTP_HOST} !^100\.86\.46\.5(:443)?$    [NC]
    RewriteCond %{HTTP_HOST} !\.ts\.net$                 [NC]
    RewriteRule .* - [F]

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;"

    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block execution of anything uploaded
    <Directory /var/www/html/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        <FilesMatch "\.(php|phtml|php3|php4|php5|pl|py|jsp|asp|sh|cgi)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog  /var/log/apache2/asf_error.log
    CustomLog /var/log/apache2/asf_access.log combined
</VirtualHost>
