# ── AutoSecForge Pro v12.1 — Domain-locked HTTPS vhost ───────────────
# Access policy:
#   • Reachable ONLY via https://autosecforge.com
#   • Any request by raw IP or any other Host header → 403 Forbidden
#   • Plain HTTP is redirected to HTTPS (for the canonical domain only)
# Self-signed cert is generated at image build (see Dockerfile).

ServerName autosecforge.com

# ===================================================================
#  PORT 80 — redirect canonical domain to HTTPS, deny everything else
# ===================================================================

# Default catch-all on :80 — blocks IP access and unknown hosts
<VirtualHost *:80>
    ServerName  asf-deny-http
    DocumentRoot /var/www/html
    <Location />
        Require all denied
    </Location>
</VirtualHost>

# Canonical domain on :80 — force HTTPS
<VirtualHost *:80>
    ServerName autosecforge.com
    RewriteEngine On
    RewriteRule ^/?(.*)$ https://autosecforge.com/$1 [R=301,L]
</VirtualHost>

# ===================================================================
#  PORT 443 — TLS
# ===================================================================

# Default catch-all on :443 — blocks IP / unknown-host access over TLS.
# Must be the FIRST *:443 vhost: Apache routes any request whose Host
# doesn't match a ServerName to the first-listed vhost for the address.
<VirtualHost *:443>
    ServerName  asf-deny-https
    DocumentRoot /var/www/html
    SSLEngine on
    SSLCertificateFile    /etc/ssl/asf/autosecforge.crt
    SSLCertificateKeyFile /etc/ssl/asf/autosecforge.key
    <Location />
        Require all denied
    </Location>
</VirtualHost>

# Canonical domain on :443 — the real application
<VirtualHost *:443>
    ServerName autosecforge.com
    # Tailnet access: also route the Tailscale IP and MagicDNS name here so
    # phones/tablets (which can't edit a hosts file) can reach the app by IP.
    # Without a ServerAlias these requests fall to the deny catch-all above.
    ServerAlias 100.86.46.5 *.ts.net
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/ssl/asf/autosecforge.crt
    SSLCertificateKeyFile /etc/ssl/asf/autosecforge.key
    SSLProtocol           -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite        HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder   on

    # Hard gate: serve only for approved hostnames; everything else → 403.
    #   • autosecforge.com    — canonical domain (laptops via hosts file)
    #   • 100.86.46.5         — Tailscale IP (phones/tablets, no hosts file)
    #   • *.ts.net            — Tailscale MagicDNS name
    # Multiple conditions are AND-ed, so access is denied only when the Host
    # matches NONE of the allowed patterns.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^autosecforge\.com$        [NC]
    RewriteCond %{HTTP_HOST} !^100\.86\.46\.5(:443)?$    [NC]
    RewriteCond %{HTTP_HOST} !\.ts\.net$                 [NC]
    RewriteRule .* - [F]

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # CDNs in the allow-list are exactly those the UI loads from:
    #   cdn.jsdelivr.net      → Bootstrap 4, AdminLTE 3.2, jQuery, Chart.js
    #   cdnjs.cloudflare.com  → Font Awesome (css + webfonts)
    #   fonts.googleapis.com / fonts.gstatic.com → Inter font
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;"

    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block execution of anything uploaded
    <Directory /var/www/html/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        <FilesMatch "\.(php|phtml|php3|php4|php5|pl|py|jsp|asp|sh|cgi)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog  /var/log/apache2/asf_error.log
    CustomLog /var/log/apache2/asf_access.log combined
</VirtualHost>
