<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="120" height="60" rx="28" ry="28" fill="url(#shine)"/>
  <!-- Shield body -->
  <path d="M60 18 L88 30 L88 58 Q88 80 60 96 Q32 80 32 58 L32 30 Z"
        fill="none" stroke="white" stroke-width="4.5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Inner shield fill (semi-transparent) -->
  <path d="M60 24 L83 34.5 L83 57 Q83 76 60 90 Q37 76 37 57 L37 34.5 Z"
        fill="rgba(255,255,255,0.12)"/>
  <!-- Lock body -->
  <rect x="51" y="57" width="18" height="14" rx="3" ry="3" fill="white"/>
  <!-- Lock shackle -->
  <path d="M54 57 L54 52 Q54 45 60 45 Q66 45 66 52 L66 57"
        fill="none" stroke="white" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lock keyhole -->
  <circle cx="60" cy="63" r="2.5" fill="#6366f1"/>
  <rect x="58.75" y="63" width="2.5" height="4" rx="1" fill="#6366f1"/>
</svg>
