# ── AutoSecForge Pro v12.1 ─────────────────────────────────────────
# WSL2 / Kali-Linux-Docker compatible
#
# ACCESS POLICY:
#   • Only the PHP app is reachable from the host, and ONLY over HTTPS
#     via the domain https://autosecforge.com
#   • App ports are bound to 127.0.0.1 — not reachable from the LAN/IP
#   • All tool/AI/DB services have NO host ports — they are reachable
#     only on the internal `asf-net` Docker network (service-to-service)
#
# SETUP:
#   1) Map the domain to localhost (host machine):
#        echo "127.0.0.1 autosecforge.com" | sudo tee -a /etc/hosts
#        (Windows: add to C:\Windows\System32\drivers\etc\hosts)
#   2) docker compose up -d --build
#   3) docker exec autosecforge-ollama ollama pull llama3
#   4) Open: https://autosecforge.com   (accept the self-signed cert)
#      Login: admin@autosecforge.local / Admin@123

networks:
  asf-net:
    driver: bridge

volumes:
  ollama-data:
  mysql-data:
  sonar-data:
  sonar-logs:
  sonar-ext:
  sast-src:          # shared source tree: app unzips here, scanner reads it

services:

  # ── PHP Application (the ONLY host-exposed service) ────────────
  app:
    build: .
    container_name: autosecforge-app
    ports:
      # Bound to loopback only — no IP/LAN access. Reach via the domain.
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./public:/var/www/html
      - ./views:/var/www/views
      - ./src:/var/www/src
      - sast-src:/var/www/sast        # source upload area for SonarQube SAST
    environment:
      MCP_URL:        http://mcp-router:6300
      AI_AGENT_URL:   http://ai-agent:6400
      OASM_URL:       http://oasm:6200
      MOBSF_URL:      http://mobsf:8000
      MOBSF_API_KEY:  ${MOBSF_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # WSL2 / Kali host access
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asf-net
    restart: unless-stopped

  # ── MySQL 8 (internal only) ───────────────────────────────────
  db:
    image: mysql:8.4
    container_name: autosecforge-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE:      ${DB_NAME:-security_dashboard}
      MYSQL_USER:          ${DB_USER:-dashboard}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-ChangeMe123}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asf-net
    restart: unless-stopped

  # ── Ollama Local LLM (internal only) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: autosecforge-ollama
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - asf-net
    restart: unless-stopped
    # ── GPU (uncomment for NVIDIA) ──────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── AI Agent (Ollama-backed, OpenAI-compatible API) ───────────
  ai-agent:
    build: ./ai-agent
    container_name: autosecforge-ai-agent
    expose:
      - "6400"
    environment:
      OLLAMA_URL:   http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    depends_on:
      - ollama
    networks:
      - asf-net
    restart: unless-stopped

  # ── MCP Router (HackStrike orchestration) ─────────────────────
  mcp-router:
    build: ./mcp-server
    container_name: autosecforge-mcp-router
    # The orchestrator must read the Docker socket to exec into scanner
    # containers. The socket is owned root:docker (mode 660) and the image's
    # non-root `mcp` user can't read it, so run this service as root.
    # (Socket access is already root-equivalent — no extra privilege gained.)
    user: root
    expose:
      - "6300"
    environment:
      AI_AGENT_URL:   http://ai-agent:6400
      ZAP_URL:        http://zap:8090
      ZAP_API_KEY:    ${ZAP_API_KEY:-ZapKeyChangeMe}
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN:    ${SONAR_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - ai-agent
      - zap
    networks:
      - asf-net
    restart: unless-stopped

  # ── nmap (network scanner — exec target for MCP router) ───────
  nmap:
    build: ./tool-wrappers/nmap
    container_name: autosecforge-nmap
    networks:
      - asf-net
    restart: unless-stopped

  # ── nikto (web scanner — exec target for MCP router) ──────────
  nikto:
    build: ./tool-wrappers/nikto
    container_name: autosecforge-nikto
    networks:
      - asf-net
    restart: unless-stopped

  # ── OASM (Attack Surface) ─────────────────────────────────────
  oasm:
    build: ./tool-wrappers/oasm
    container_name: autosecforge-oasm
    expose:
      - "6200"
    networks:
      - asf-net
    restart: unless-stopped

  # ── OWASP ZAP (DAST) ─────────────────────────────────────────
  zap:
    image: zaproxy/zap-stable:latest
    container_name: autosecforge-zap
    # api.addrs.* = allow API calls from any container on asf-net (ZAP otherwise
    # rejects non-localhost callers, so the mcp-router can't drive it).
    command:
      - zap.sh
      - -daemon
      - -host
      - 0.0.0.0
      - -port
      - "8090"
      - -config
      - api.key=${ZAP_API_KEY:-ZapKeyChangeMe}
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
    environment:
      # Cap the JVM heap so ZAP starts reliably on a memory-constrained host
      # (default is 1/4 of RAM, which gets OOM-killed alongside the other Java
      # services). Raise this if you have spare RAM.
      _JAVA_OPTIONS: "-Xmx1024m"
    mem_limit: 1536m
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/JSON/core/view/version/?apikey=${ZAP_API_KEY:-ZapKeyChangeMe}"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - asf-net
    restart: unless-stopped

  # ── SonarQube (SAST) ──────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: autosecforge-sonarqube
    expose:
      - "9000"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
      - sonar-ext:/opt/sonarqube/extensions
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    networks:
      - asf-net
    restart: unless-stopped

  # ── Sonar Scanner CLI (exec target for the SAST flow) ─────────
  # Long-lived idle container; mcp-router execs `sonar-scanner` into it
  # against the shared /usr/src tree the app unzips uploads into.
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: autosecforge-sonar-scanner
    entrypoint: ["sh", "-c", "sleep infinity"]
    volumes:
      - sast-src:/usr/src
    networks:
      - asf-net
    restart: unless-stopped

  # ── MobSF (Mobile security) ───────────────────────────────────
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: autosecforge-mobsf
    # Pin a fixed REST API key so the app can authenticate deterministically.
    # Set MOBSF_API_KEY in .env (same value reaches the app service above).
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
    expose:
      - "8000"
    networks:
      - asf-net
    restart: unless-stopped

  # ── Trivy (SCA/container scanning) ───────────────────────────
  trivy:
    image: aquasec/trivy:latest
    container_name: autosecforge-trivy
    command: server --listen 0.0.0.0:8081
    expose:
      - "8081"
    networks:
      - asf-net
    restart: unless-stopped

  # ── Pentest Python (replicated) ───────────────────────────────
  pentest-python:
    build: ./tool-wrappers/pentest-python
    deploy:
      replicas: 2
    networks:
      - asf-net
    restart: unless-stopped

  # ── SQLMap ────────────────────────────────────────────────────
  sqlmap:
    build: ./tool-wrappers/sqlmap
    container_name: autosecforge-sqlmap
    expose:
      - "6000"
    networks:
      - asf-net
    restart: unless-stopped
